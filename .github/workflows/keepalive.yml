# Weekly keep-alive so the free Supabase project never auto-pauses.
# Free-tier Supabase projects pause after ~7 days of inactivity; a paused
# project makes Cloud Sync fail with "Failed to fetch". This runs a tiny
# authenticated query a couple times a week to keep the project active.
#
# ONE-TIME SETUP (required for this to work):
#   Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#     SUPABASE_URL        = https://chpexdmbwbtdyqzfvmow.supabase.co
#     SUPABASE_ANON_KEY   = <your anon public key>
name: supabase-keepalive

on:
  schedule:
    - cron: '0 6 * * 1,4'   # 06:00 UTC every Monday and Thursday
  workflow_dispatch:          # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_ANON_KEY repo secrets are not set."
            echo "Add them under Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/astro_sync?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $code"
          if [ "$code" -ge 500 ] || [ "$code" -eq 0 ]; then
            echo "::error::Unexpected response ($code) — project may be paused or unreachable."
            exit 1
          fi
